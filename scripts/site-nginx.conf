server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/site;
    index index.php index.haml index.html LoginGame.aspx;

    # Ruffle's wasm needs the proper MIME type for instantiateStreaming.
    location ~ \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=86400";
    }

    # Flash client gateway: /Request/*.aspx and /Request/*.ashx -> xsp4 on 8092
    location ~* ^/Request/.*\.(aspx|ashx|asmx|axd)$ {
        rewrite ^/Request/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8092;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ASP.NET handlers at the root -> xsp4 on 8090 (Novo Site)
    location ~* \.(aspx|ashx|asmx|axd)$ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Admin Painel is exposed on container port 8081 directly (separate server block)

    # PHP files via php-fpm
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php7.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Short URL for Flash Projector: http://<host>:8080/jogar?u=jogador1
    # Redirects to the full Loading.swf URL with the LAN config and a random key.
    # Defaults: u=jogador1 (the seeded test user). Override with ?u=otheruser.
    location = /jogar {
        set $u $arg_u;
        if ($u = '') { set $u 'jogador1'; }
        return 302 http://$http_host/Flash/Loading.swf?user=$u&key=k$request_id&config=http://$http_host/config-lan.xml;
    }

    # Static files (images, swf, css, xml, etc.)
    location / {
        try_files $uri $uri/ =404;
    }

    location ~ /\.ht { deny all; }
}

# Painel admin on a separate listener so its absolute redirects (e.g.
# /Account/Login.aspx) keep working without a /painel/ prefix to strip.
server {
    listen 8081 default_server;
    listen [::]:8081 default_server;
    server_name _;
    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
