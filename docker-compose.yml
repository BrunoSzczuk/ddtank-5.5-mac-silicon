services:
  center:
    build:
      context: .
      dockerfile: Dockerfile.emulator
    image: ddt-emulator:latest
    container_name: ddt-center
    depends_on:
      mssql:
        condition: service_healthy
    # Map gameserver to 0.0.0.0 so Mono binds WCF on every interface (so the
     # site container can reach it via the network alias). When other containers
     # resolve "gameserver" via Docker DNS they still get the Center container's
     # real IP — only the local hosts-file mapping uses 0.0.0.0.
    extra_hosts:
      - "gameserver:0.0.0.0"
    ports:
      - "2008:2008"
      - "2009:2009"
      - "9200:9200"
      - "9202:9202"
      - "9208:9208"
      # WebSocket bridge ports (ws-road, ws-center, ws-fighting). These run in
      # sidecar containers that share this network namespace, so the host port
      # binding has to be declared here on the namespace owner.
      - "9300:9300"
      - "9302:9302"
      - "9308:9308"
      # Flash Socket Policy server (sidecar in this network namespace)
      - "843:843"
    networks:
      default:
        aliases:
          - gameserver
    command: ["run-service", "Center"]
    stdin_open: true
    tty: true
    restart: "no"

  fighting:
    image: ddt-emulator:latest
    container_name: ddt-fighting
    depends_on:
      center:
        condition: service_started
    network_mode: "service:center"
    command: ["run-service", "Fighting"]
    stdin_open: true
    tty: true
    restart: "no"

  road:
    image: ddt-emulator:latest
    container_name: ddt-road
    depends_on:
      center:
        condition: service_started
    network_mode: "service:center"
    command: ["run-service", "Road"]
    stdin_open: true
    tty: true
    restart: "no"

  # Flash Player Socket Policy server (port 843). The Flash standalone
  # Projector pings 843 before opening any Socket; if there's no permissive
  # policy file it refuses to connect. Center itself can't speak the XML
  # policy protocol (its 9202 socket cuts straight into the game wire
  # format), so we run a tiny sidecar here.
  flash-policy:
    image: alpine/socat:latest
    container_name: ddt-flash-policy
    depends_on:
      - center
    network_mode: "service:center"
    volumes:
      - ./scripts/flash-policy.xml:/policy.xml:ro
    # socat reads the policy file (must end with NUL, which we append) and
    # writes it on every TCP connect to :843. Flash clients send their
    # "<policy-file-request/>\0" and then read the response; we just stream
    # the policy unconditionally.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "cat /policy.xml > /tmp/p && printf '\\0' >> /tmp/p && exec socat -T 3 TCP-LISTEN:843,reuseaddr,fork SYSTEM:'cat /tmp/p'"
    restart: "no"

  # WebSocket -> TCP bridges so Ruffle (in the browser) can talk to the game
  # sockets that the Flash client opens on 9200/9202/9208. Each bridge is a
  # tiny container sharing Center's network namespace, listening on a public
  # port and forwarding to the TCP service on 127.0.0.1 in that namespace.
  ws-center:
    image: efrecon/websockify:latest
    container_name: ddt-ws-center
    depends_on:
      - center
    network_mode: "service:center"
    command: ["0.0.0.0:9302", "127.0.0.1:9202"]
    restart: "no"

  ws-fighting:
    image: efrecon/websockify:latest
    container_name: ddt-ws-fighting
    depends_on:
      - center
    network_mode: "service:center"
    command: ["0.0.0.0:9308", "127.0.0.1:9208"]
    restart: "no"

  ws-road:
    image: efrecon/websockify:latest
    container_name: ddt-ws-road
    depends_on:
      - center
    network_mode: "service:center"
    command: ["0.0.0.0:9300", "127.0.0.1:9200"]
    restart: "no"

  site:
    build:
      context: .
      dockerfile: Dockerfile.site
    image: ddt-site:latest
    container_name: ddt-site
    depends_on:
      mssql:
        condition: service_healthy
      center:
        condition: service_started
    networks:
      default:
        aliases:
          - site
    ports:
      - "8080:80"
      - "8081:8081"
    volumes:
      # Mount the Flash client SWFs and assets read-only so nginx can serve
      # them under /Flash/. The 120MB tree is too big to bake into the image.
      - ./Servidor5.5/br/flash:/opt/site/Flash:ro
    restart: "no"

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    platform: linux/amd64
    container_name: ddt-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ddtank@2016"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
      - ./Servidor5.5/DataBases:/backup:ro
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -No -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

volumes:
  mssql-data:
